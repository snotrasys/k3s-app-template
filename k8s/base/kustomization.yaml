apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml

# IMPORTANTE: al clonar este template, reemplaza __APP_NAME__ con el nombre del repo:
#   sed -i '' 's/__APP_NAME__/mi-app/g' k8s/**/*.yaml src/server.js Dockerfile
commonLabels:
  app.kubernetes.io/name: __APP_NAME__
  app.kubernetes.io/managed-by: argocd

# Renombra Deployment + Service + IngressRoute al nombre del app
namePrefix: ""
nameSuffix: ""
